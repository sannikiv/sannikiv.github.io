baseURL: "https://sannikiv.github.io/" 
title: Sanni Kiviholma
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
pagination:
  pagerSize: 20

taxonomies:
    tag: tags

menu:
    main:
        - name: Research
          url: papers/
          weight: 1

params:
    description: "Postdoctoral researcher"
    author: Sanni Kiviholma
    # googleAnalyticsID: "G-XXXXX"
    DateFormat: "January 2006"
    defaultTheme: light
    hideFooter: false
    disableThemeToggle: true
    ShowShareButtons: false
    ShowReadingTime: false
    disableSpecial1stPost: true
    disableAnchoredHeadings: true
    ShowPostNavLinks: false
    ShowBreadCrumbs: false
    ShowCodeCopyButtons: true
    ShowAllPagesInArchive: false
    MainSections: ["papers"]
    ShowToc: false
    disableScrollToTop: true
    TocOpen: true
    ShowWordCount: false
    UseHugoToc: true
    comments: false
    math: true
    profileMode:
          enabled: true
          title: Sanni Kiviholma
          imageUrl: "/Sanni_Kiviholma.jpg"
          imageWidth: 160
          imageHeight: 160
          buttons:
            - name: Research
              url: papers/
            - name: CV
              url: cv.pdf
  
    socialIcons:
        - name: Email
          url: mailto:sanni.kiviholma@unil.ch
        - name: Google Scholar
          url: https://scholar.google.com/citations?user=FnrJEo8AAAAJ&hl=en&oi=ao
        - name: Bluesky
          url: https://bsky.app/profile/sannikiviholma.bsky.social
        - name: Linkedin
          url: https://www.linkedin.com/in/sannikiv/

    assets:
        disableScrollBarStyle: true
    cover:
        hiddenInList: false
        hiddenInSingle: true
    label:
      text: "Sanni Kiviholma"
      icon: favicon.ico
      iconHeight: 18

markup:
    goldmark:
        renderer:
            unsafe: true
    highlight:
        guessSyntax: true
        style: autumn 
    tableOfContents:
        endLevel: 2
        ordered: false
        startLevel: 2